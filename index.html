<h2>MCQ Quiz</h2>

<p>১. বাংলাদেশের রাজধানী কী?</p>
<button onclick="check('A')">ঢাকা</button>
<button onclick="check('B')">চট্টগ্রাম</button>
<p id="result1"></p>

<hr>

<p>২. বাংলাদেশের জাতীয় ফুল কী?</p>
<button onclick="check2('A')">শাপলা</button>
<button onclick="check2('B')">গোলাপ</button>
<p id="result2"></p>

<script>
function check(a){
  if(a=="A"){
    document.getElementById("result1").innerHTML="✅ সঠিক উত্তর";
  }else{
    document.getElementById("result1").innerHTML="❌ ভুল উত্তর";
  }
}

function check2(a){
  if(a=="A"){
    document.getElementById("result2").innerHTML="✅ সঠিক উত্তর";
  }else{
    document.getElementById("result2").innerHTML="❌ ভুল উত্তর";
  }
}
</script>
